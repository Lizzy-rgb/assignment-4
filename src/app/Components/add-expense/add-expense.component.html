<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <!-- Page header -->
      <div class="mb-4">
        <h2 class="fw-bold mb-0">Add Expense</h2>
        <p class="text-muted small mb-0">Fill in the details below</p>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form (ngSubmit)="onSubmit()">

            <!-- Title — two-way binding via [(ngModel)] -->
            <div class="mb-3">
              <label for="title" class="form-label fw-semibold">Title</label>
              <input
                id="title"
                type="text"
                name="title"
                class="form-control"
                placeholder="e.g. Coffee, Flight ticket"
                [(ngModel)]="title"
                required
              />
            </div>

            <!-- Amount — two-way binding via [(ngModel)] -->
            <div class="mb-3">
              <label for="amount" class="form-label fw-semibold">Amount ($)</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input
                  id="amount"
                  type="number"
                  name="amount"
                  class="form-control"
                  placeholder="0.00"
                  [(ngModel)]="amount"
                  min="0.01"
                  step="0.01"
                  required
                />
              </div>
              <!-- Conditional class binding: warn if amount looks high -->
              <div class="form-text"
                   [class.text-warning]="amount > 500"
                   [class.fw-semibold]="amount > 500">
                @if (amount > 500) { High-value expense } @else { Enter the expense amount }
              </div>
            </div>

            <!-- Category — two-way binding via [(ngModel)]; options from service signal -->
            <div class="mb-4">
              <label for="category" class="form-label fw-semibold">Category</label>
              <select
                id="category"
                name="category"
                class="form-select"
                [(ngModel)]="category"
              >
                @for (cat of categories(); track cat) {
                  <option [value]="cat">{{ cat }}</option>
                }
              </select>
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1">
                Add Expense
              </button>
              <a routerLink="/expenses" class="btn btn-outline-secondary">Cancel</a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
