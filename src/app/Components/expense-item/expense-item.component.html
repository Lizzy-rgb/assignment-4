<!--
  Class binding:  border-warning     when amount > $200
  Style binding:  border-left-color  driven by category via CSS variable
-->
<div
  class="card border-0 shadow-sm mb-3 border-start border-start-4"
  [class.border-warning]="isHighExpense"
  [class.bg-warning-subtle]="isHighExpense"
  [style.border-left-color]="categoryColor + ' !important'"
>
  <div class="card-body d-flex justify-content-between align-items-center gap-3">

    <!-- Left: title + category badge -->
    <div class="flex-grow-1 min-width-0">
      <p class="fw-semibold mb-1 text-truncate">{{ expense.title }}</p>
      <!-- Style binding: badge background matches category color -->
      <span
        class="badge rounded-pill small"
        [style.background-color]="categoryColor"
      >
        {{ expense.category }}
      </span>
    </div>

    <!-- Right: amount + action buttons -->
    <div class="d-flex align-items-center gap-3 flex-shrink-0">
      <!-- Class binding: amount color changes by threshold -->
      <span
        class="fw-bold fs-5"
        [class.text-success]="expense.amount <= 100"
        [class.text-warning]="expense.amount > 100 && expense.amount <= 500"
        [class.text-danger]="expense.amount > 500"
      >
        {{ expense.amount | currency }}
      </span>

      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-primary" (click)="onEdit()">Edit</button>
        <button class="btn btn-sm btn-outline-danger" (click)="onDelete()">Delete</button>
      </div>
    </div>

  </div>
</div>
