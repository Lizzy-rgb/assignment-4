<form class="edit-form" (ngSubmit)="onSave()">
  <h3 class="edit-form__title">Edit Expense</h3>

  <div class="form-group">
    <label for="edit-title">Title</label>
    <input
      id="edit-title"
      type="text"
      name="editTitle"
      [(ngModel)]="title"
      required
    />
  </div>

  <div class="form-group">
    <label for="edit-amount">Amount ($)</label>
    <input
      id="edit-amount"
      type="number"
      name="editAmount"
      [(ngModel)]="amount"
      min="0.01"
      step="0.01"
      required
    />
  </div>

  <div class="form-group">
    <label for="edit-category">Category</label>
    <select id="edit-category" name="editCategory" [(ngModel)]="category">
      @for (cat of categories; track cat) {
        <option [value]="cat">{{ cat }}</option>
      }
    </select>
  </div>

  <div class="edit-form__actions">
    <button type="submit" class="btn btn--save">Save</button>
    <button type="button" class="btn btn--cancel" (click)="onCancel()">Cancel</button>
  </div>
</form>
