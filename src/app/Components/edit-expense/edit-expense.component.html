<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      @if (notFound) {
        <!-- Not-found state -->
        <div class="alert alert-warning" role="alert">
          <h5 class="alert-heading">Expense not found</h5>
          <p class="mb-0">The expense you're trying to edit does not exist.</p>
        </div>
        <a routerLink="/expenses" class="btn btn-outline-secondary mt-2">
          &larr; Back to Expenses
        </a>

      } @else if (expense()) {
        <!-- Page header -->
        <div class="mb-4">
          <h2 class="fw-bold mb-0">Edit Expense</h2>
          <p class="text-muted small mb-0">Update the details below</p>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <form (ngSubmit)="onSave()">

              <!-- Title — two-way binding via [(ngModel)] -->
              <div class="mb-3">
                <label for="edit-title" class="form-label fw-semibold">Title</label>
                <input
                  id="edit-title"
                  type="text"
                  name="editTitle"
                  class="form-control"
                  [(ngModel)]="title"
                  required
                />
              </div>

              <!-- Amount — two-way binding via [(ngModel)] -->
              <div class="mb-3">
                <label for="edit-amount" class="form-label fw-semibold">Amount ($)</label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input
                    id="edit-amount"
                    type="number"
                    name="editAmount"
                    class="form-control"
                    [(ngModel)]="amount"
                    min="0.01"
                    step="0.01"
                    required
                  />
                </div>
                <!-- Conditional class binding: flag high-value amounts -->
                <div class="form-text"
                     [class.text-warning]="amount > 500"
                     [class.fw-semibold]="amount > 500">
                  @if (amount > 500) { High-value expense } @else { Enter the expense amount }
                </div>
              </div>

              <!-- Category — two-way binding via [(ngModel)]; options from service signal -->
              <div class="mb-4">
                <label for="edit-category" class="form-label fw-semibold">Category</label>
                <select
                  id="edit-category"
                  name="editCategory"
                  class="form-select"
                  [(ngModel)]="category"
                >
                  @for (cat of categories(); track cat) {
                    <option [value]="cat">{{ cat }}</option>
                  }
                </select>
              </div>

              <!-- Actions -->
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">
                  Save Changes
                </button>
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  (click)="onCancel()"
                >
                  Cancel
                </button>
              </div>

            </form>
          </div>
        </div>

      } @else {
        <!-- Loading state while expense signal is null -->
        <div class="text-center py-5 text-muted">Loading…</div>
      }

    </div>
  </div>
</div>
